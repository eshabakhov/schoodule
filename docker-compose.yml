services:
  haproxy:
    image: haproxy:3.3-alpine
    container_name: haproxy
    depends_on:
      - schoodule
    ports:
      - "443:443"
      - "8404:8404"
    volumes:
      - ./haproxy:/usr/local/etc/haproxy

  postgres:
    container_name: postgres
    image: ${POSTGRES_IMAGE:-postgres:14-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-postgres}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  schoodule:
    container_name: schoodule
    image: ${APP_IMAGE:-schoodule-app:local}
    build:
      context: .
      args:
        JAR_FILE: ${JAR_FILE:-target/schoodule-0.0.1.jar}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-postgres}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      SERVER_PORT: 9500
      YA_ID: ${YA_ID:-}
      YA_SECRET: ${YA_SECRET:-}
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-false}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}

volumes:
  postgres-data:
