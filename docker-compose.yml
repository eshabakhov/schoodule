services:
  haproxy:
    image: haproxy:3.3-alpine
    container_name: haproxy
    depends_on:
      - schoodule
      - grafana
      - prometheus
    ports:
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./haproxy:/usr/local/etc/haproxy

  postgres:
    container_name: postgres
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-schoodule}
      POSTGRES_USER: ${DB_USERNAME:-schoodule}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  schoodule:
    container_name: schoodule
    image: ghcr.io/eshabakhov/schoodule:latest
    build:
      context: .
      args:
        JAR_FILE: ${JAR_FILE:-target/schoodule-0.0.1.jar}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"
      - "--storage.tsdb.min-block-duration=2h"
      - "--web.external-url=${APP_BASE_URL:-https://schoodule.ru}/prometheus/"
      - "--web.route-prefix=/prometheus/"

  grafana:
    image: grafana/grafana
    container_name: grafana
    depends_on:
      - prometheus
    env_file:
      - .env
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  postgres-data:
  grafana-data:
