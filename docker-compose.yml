services:
  haproxy:
    image: haproxy:3.3-alpine
    container_name: haproxy
    depends_on:
      - schoodule
      - grafana
      - prometheus
    ports:
      - "443:443"
    environment:
      MONITORING_BASIC_AUTH_USERNAME: ${MONITORING_BASIC_AUTH_USERNAME:?MONITORING_BASIC_AUTH_USERNAME is required}
      MONITORING_BASIC_AUTH_PASSWORD: ${MONITORING_BASIC_AUTH_PASSWORD:?MONITORING_BASIC_AUTH_PASSWORD is required}
    volumes:
      - ./haproxy:/usr/local/etc/haproxy

  postgres:
    container_name: postgres
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-schoodule}
      POSTGRES_USER: ${DB_USERNAME:-schoodule}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  schoodule:
    container_name: schoodule
    image: ghcr.io/eshabakhov/schoodule:latest
    build:
      context: .
      args:
        JAR_FILE: ${JAR_FILE:-target/schoodule-0.0.1.jar}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-schoodule}
      DB_USERNAME: ${DB_USERNAME:-schoodule}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SERVER_PORT: 9500
      YA_ID: ${YA_ID:-}
      YA_SECRET: ${YA_SECRET:-}
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-false}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      APP_SECURITY_ALLOWED_ORIGINS: ${APP_SECURITY_ALLOWED_ORIGINS:-https://schoodule.ru}
      APP_SECURITY_DOCS_ENABLED: ${APP_SECURITY_DOCS_ENABLED:-false}
      APP_SECURITY_PROMETHEUS_ENABLED: ${APP_SECURITY_PROMETHEUS_ENABLED:-true}
      APP_SECURITY_SECURE_COOKIE: ${APP_SECURITY_SECURE_COOKIE:-true}

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"
      - "--storage.tsdb.min-block-duration=2h"
      - "--web.external-url=${APP_BASE_URL:-https://schoodule.ru}/prometheus/"
      - "--web.route-prefix=/prometheus/"

  grafana:
    image: grafana/grafana
    container_name: grafana
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_LOG_LEVEL=warn
      - GF_SERVER_ROOT_URL=${APP_BASE_URL:-https://schoodule.ru}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana

volumes:
  postgres-data:
  grafana-data:
