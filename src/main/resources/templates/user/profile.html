<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{base}">
<head>
    <title>Профиль</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-title-row" style="margin-bottom:1.5rem;">
        <div>
            <h1>Профиль</h1>
            <p class="page-subtitle">Информация об аккаунте</p>
        </div>
    </div>
    <div style="max-width:520px;display:flex;flex-direction:column;gap:1rem;">
        <div class="card">
            <div class="card-body" style="display:flex;align-items:center;gap:1.25rem;">
                <div style="width:56px;height:56px;border-radius:50%;
                            background:var(--primary);color:var(--primary-fg);
                            display:flex;align-items:center;justify-content:center;
                            font-size:1.375rem;font-weight:700;flex-shrink:0;letter-spacing:-.02em;">
                    <span th:text="${#strings.toUpperCase(#strings.substring(user.credentials().username(), 0, 1))}">U</span>
                </div>
                <div style="min-width:0;">
                    <div style="font-size:1.0625rem;font-weight:600;color:var(--fg);
                                overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                         th:text="${user.credentials().username()}">username</div>
                    <div style="font-size:.8125rem;color:var(--muted-fg);margin-top:.125rem;">
                        ID: <span th:text="${user.uid()}" style="font-family:monospace;">1</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="card">
            <div class="card-header">
                <div class="card-title">Данные аккаунта</div>
            </div>
            <div class="card-body" style="display:flex;flex-direction:column;gap:.875rem;">
                <div class="info-row" style="border-bottom:1px solid var(--border);padding-bottom:.875rem;">
                    <span class="info-label">Логин</span>
                    <span class="info-value" th:text="${user.credentials().username()}">username</span>
                </div>
                <div class="info-row" style="border-bottom:1px solid var(--border);padding-bottom:.875rem;">
                    <span class="info-label">ID</span>
                    <span class="info-value td-mono" th:text="${user.uid()}">1</span>
                </div>
                <div class="info-row" th:if="${school!= null && school.name() != null}"
                     style="border-bottom:1px solid var(--border);padding-bottom:.875rem;">
                    <span class="info-label">Школа</span>
                    <a th:href="@{/schools/{id}(id=${user.info().school()})}"
                       class="info-value"
                       style="color:var(--fg);text-decoration:underline;text-underline-offset:2px;"
                       th:text="${school.name()}">Школа</a>
                </div>
                <div class="info-row">
                    <span class="info-label">Роли</span>
                    <div style="display:flex;flex-wrap:wrap;gap:.375rem;">
                        <span th:each="role : ${user.roles().list()}"
                              class="badge badge-secondary"
                              th:text="${role.name()}">ROLE</span>
                        <span th:if="${#lists.isEmpty(user.roles().list())}"
                              class="badge badge-outline">Нет ролей</span>
                    </div>
                </div>

            </div>
        </div>
        <div class="card">
            <div class="card-body">
                <form th:action="@{/logout}" method="post"
                      style="display:flex;align-items:center;justify-content:space-between;gap:1rem;">
                    <div>
                        <div style="font-size:.875rem;font-weight:500;color:var(--fg);">Выйти из системы</div>
                        <div style="font-size:.8125rem;color:var(--muted-fg);margin-top:.125rem;">
                            Завершить текущую сессию
                        </div>
                    </div>
                    <button type="submit"
                            style="all:unset;box-sizing:border-box;display:inline-flex;
                                   align-items:center;gap:.5rem;padding:.5rem 1rem;
                                   font-size:.875rem;font-weight:500;font-family:inherit;
                                   border-radius:var(--radius-sm);border:1px solid #fecaca;
                                   background:#fef2f2;color:#dc2626;cursor:pointer;
                                   transition:background 150ms ease,border-color 150ms ease;
                                   white-space:nowrap;"
                            onmouseover="this.style.background='#fee2e2'"
                            onmouseout="this.style.background='#fef2f2'">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                             stroke="currentColor" stroke-width="2"
                             style="width:15px;height:15px;">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        Выйти
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
