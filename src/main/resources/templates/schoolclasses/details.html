<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{base}">
<head>
    <title th:text="${pageTitle}">Класс</title>
</head>
<body>
<div layout:fragment="content">
    <div class="page-title-row" style="margin-bottom:1.5rem;">
        <div>
            <h1 th:text="${clazz.name()}">Класс</h1>
            <p class="page-subtitle">Информация о классе</p>
        </div>
    </div>
    <div class="school-info">
        <div class="info-row">
            <span class="info-label">ID:</span>
            <span class="info-value" th:text="${clazz.uid()}">1</span>
        </div>
        <div class="info-row">
            <span class="info-label">Название:</span>
            <span class="info-value" th:text="${clazz.name()}">Класс</span>
        </div>
    </div>
    <div class="actions">
        <a th:href="@{/schools/{s}/classes/{c}/edit(s=${school.uid()},c=${clazz.uid()})}"
           class="btn-outline-action">
            Редактировать
        </a>
        <button class="btn-outline-action btn-delete-row"
                th:data-id="${clazz.uid()}"
                th:data-name="${clazz.name()}"
                style="color:var(--destructive);border-color:#fecaca;background:#fef2f2;">
            Удалить
        </button>
    </div>
</div>
<th:block layout:fragment="page-scripts">
    <script th:inline="javascript">
        const schoolId = /*[[${school.uid()}]]*/ 0;
    </script>
    <script>
        $(() => {
            $(document).on('click', '.btn-delete-row', function() {
                const id = $(this).data('id');
                const name = $(this).data('name');
                if (!confirm(`Удалить «${name}»? Это действие нельзя отменить.`)) return;
                $.ajax({
                    url: `/api/schools/${schoolId}/classes/${id}`,
                    method: 'DELETE',
                    headers: { version: 'SIMPLE' }
                })
                    .done(() => {
                        window.location.href = `/schools/${schoolId}/classes`;
                    })
                    .fail(() => alert('Не удалось удалить класс'));
            });
        });
    </script>
</th:block>
</body>
</html>
