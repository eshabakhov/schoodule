<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{base}">
<head><title>Предметы</title></head>
<body>
<div layout:fragment="content">
    <div class="page-title-row">
        <div>
            <h1>Предметы</h1>
            <p class="page-subtitle">Управление предметами школы</p>
        </div>
        <button id="open-create-subject">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2" style="width:15px;height:15px;">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Добавить предмет
        </button>
    </div>
    <div class="card">
        <div class="card-header">
            <div class="card-header-left">
                <div class="card-title">Список предметов</div>
                <div class="card-desc">Всего: <span th:text="${#lists.isEmpty(subjects) ? 0 : #lists.size(subjects)}">0</span></div>
            </div>
            <div class="search-wrap" style="width:220px;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="entity-search" placeholder="Поиск..."/>
            </div>
        </div>
        <div class="data-table-wrap" id="subjects-container">
            <table class="shadcn-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(subjects)}">
                    <td colspan="3" class="table-empty">Предметы не найдены. Добавьте первый предмет.</td>
                </tr>
                <tr th:each="item : ${subjects}"
                    class="entity-row"
                    th:data-id="${item.uid()}"
                    th:data-name="${item.name().toLowerCase()}">
                    <td class="td-mono" th:text="${item.uid()}">1</td>
                    <td class="td-primary" th:text="${item.name()}">Предмет</td>
                    <td>
                        <div class="td-actions">
                            <button class="btn-icon-ghost btn-edit-row"
                                    th:data-id="${item.uid()}" th:data-name="${item.name()}"
                                    title="Редактировать">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                            </button>
                            <button class="btn-icon-ghost btn-delete-row"
                                    th:data-id="${item.uid()}" th:data-name="${item.name()}"
                                    title="Удалить" style="color:var(--destructive);">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                    <path d="M10 11v6M14 11v6"/>
                                    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <th:block th:insert="~{fragments/pagination :: pagination('/subjects', ${page}, ${hasPrev}, ${hasNext})}"></th:block>
    </div>
    <th:block th:insert="~{fragments/modal-form :: modal(
        'create-subject',
        'Добавить предмет',
        'create-subject-form',
        'Например: Математика',
        'submit-create')}"
    ></th:block>
    <th:block th:insert="~{fragments/modal-form :: modal(
        'edit-subject',
        'Редактировать предмет',
        'edit-subject-form',
        '',
        'submit-update')}"
    ></th:block>
</div>
<th:block layout:fragment="page-scripts">
    <script type="module" th:src="@{/js/subjects.js}"></script>
</th:block>
</body>
</html>
