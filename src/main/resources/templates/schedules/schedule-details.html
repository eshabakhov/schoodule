<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{base}">
<head>
    <title th:text="${schedule.name()}">Расписание</title>
</head>
<body>
<div layout:fragment="content">

    <!-- Header -->
    <div class="page-title-row" style="margin-bottom:1.25rem;">
        <div style="display:flex;align-items:flex-start;gap:1rem;">
            <a th:href="@{/schools/{id}/schedules(id=${school.uid()})}"
               class="btn-icon-back" title="Назад">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"/>
                    <polyline points="12 19 5 12 12 5"/>
                </svg>
            </a>
            <div>
                <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.25rem;">
                    <h1 style="margin:0;" th:text="${schedule.name()}">Расписание</h1>
                    <span class="badge badge-secondary">Черновик</span>
                </div>
                <p class="page-subtitle"
                   th:text="${school.name()}">Школа</p>
            </div>
        </div>
        <div style="display:flex;gap:.5rem;align-items:center;">
            <button class="btn-outline-action" id="btn-edit-schedule"
                    th:data-id="${schedule.uid()}"
                    th:data-name="${schedule.name()}">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor" stroke-width="2" style="width:15px;height:15px;">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
                Редактировать
            </button>
        </div>
    </div>

    <!-- Stat cards -->
    <div class="stat-grid" style="margin-bottom:1.5rem;">
        <div class="stat-card">
            <div class="stat-card-header">
                <span class="stat-label">Классов</span>
                <div class="stat-icon icon-blue">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor" stroke-width="2">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                        <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                    </svg>
                </div>
            </div>
            <div class="stat-value" th:text="${classCount} ?: '—'">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-header">
                <span class="stat-label">Уроков</span>
                <div class="stat-icon icon-green">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8"  y1="2" x2="8"  y2="6"/>
                        <line x1="3"  y1="10" x2="21" y2="10"/>
                    </svg>
                </div>
            </div>
            <div class="stat-value" th:text="${lessonCount} ?: '—'">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-header">
                <span class="stat-label">Учителей</span>
                <div class="stat-icon icon-purple">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
            </div>
            <div class="stat-value" th:text="${teacherCount} ?: '—'">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-header">
                <span class="stat-label">Предметов</span>
                <div class="stat-icon icon-orange">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor" stroke-width="2">
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                    </svg>
                </div>
            </div>
            <div class="stat-value" th:text="${subjectCount} ?: '—'">—</div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs-list">
        <a th:href="@{/schools/{s}/schedules/{r}/curriculum(s=${school.uid()},r=${schedule.uid()})}"
           class="tab-trigger">План классов</a>
        <a th:href="@{/schools/{s}/schedules/{r}/capacity(s=${school.uid()},r=${schedule.uid()})}"
           class="tab-trigger">Нагрузка</a>
        <a th:href="@{/schools/{s}/schedules/{r}/assignments(s=${school.uid()},r=${schedule.uid()})}"
           class="tab-trigger">Назначения</a>
        <a th:href="@{/schools/{s}/schedules/{r}/validation(s=${school.uid()},r=${schedule.uid()})}"
           class="tab-trigger">Проверка</a>
    </div>

    <!-- Edit modal -->
    <th:block th:insert="~{fragments/modal-form :: modal(
        'edit-schedule', 'Редактировать расписание', 'edit-schedule-form',
        '', 'submit-update'
    )}"></th:block>

</div>
<th:block layout:fragment="page-scripts">
    <script type="module" th:src="@{/js/schedule-details.js}"></script>
</th:block>
</body>
</html>
