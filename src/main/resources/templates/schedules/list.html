<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{base}">
<head><title th:text="${pageTitle}">Расписания</title></head>
<body>
<div layout:fragment="content">

    <div class="page-title-row">
        <div>
            <h1>Расписания</h1>
            <p class="page-subtitle">Управление школьными расписаниями</p>
        </div>
        <button id="open-create-schedule">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor" stroke-width="2" style="width:15px;height:15px;">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Создать расписание
        </button>
    </div>

    <div class="card-grid" id="schedules-container">
        <div th:each="item : ${schedules}"
             class="card-item entity-row"
             th:data-id="${item.uid()}"
             th:data-name="${item.name().toLowerCase()}">

            <div class="card-item-header">
                <div class="card-item-title-row">
                    <div class="card-item-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                             stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8"  y1="2" x2="8"  y2="6"/>
                            <line x1="3"  y1="10" x2="21" y2="10"/>
                        </svg>
                    </div>
                    <span class="card-item-name" th:text="${item.name()}">Расписание</span>
                </div>
                <span class="badge badge-secondary">Черновик</span>
            </div>

            <div class="card-item-period">
                <div class="card-item-period-label">ID</div>
                <div class="card-item-period-value td-mono" th:text="${item.uid()}">1</div>
            </div>

            <div class="card-item-actions">
                <a th:href="@{/schools/{s}/schedules/{r}(s=${school.uid()},r=${item.uid()})}"
                   class="btn-card-open">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor" stroke-width="2" style="width:14px;height:14px;">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    Открыть
                </a>
                <button class="btn-icon-ghost btn-edit-row"
                        th:data-id="${item.uid()}" th:data-name="${item.name()}"
                        title="Редактировать">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor" stroke-width="2">
                        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                    </svg>
                </button>
                <button class="btn-icon-ghost btn-delete-row"
                        th:data-id="${item.uid()}" th:data-name="${item.name()}"
                        title="Удалить" style="color:var(--destructive);">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                        <path d="M10 11v6M14 11v6"/>
                        <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <th:block th:insert="~{fragments/modal-form :: modal(
        'create-schedule',
        'Создать расписание',
        'create-schedule-form',
        'Например: Расписание 2025/2026',
        'submit-create')}"></th:block>
    <th:block th:insert="~{fragments/modal-form :: modal(
        'edit-schedule',
        'Редактировать расписание',
        'edit-schedule-form',
        '',
        'submit-update')}"></th:block>

</div>
<th:block layout:fragment="page-scripts">
    <script type="module" th:src="@{/js/schedules.js}"></script>
</th:block>
</body>
</html>
