<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="~{base}">
<head>
    <title th:text="|${schedule.name()} - План классов|">План классов</title>
    <link rel="stylesheet" th:href="@{/css/planning.css}"/>
</head>
<body>
<div layout:fragment="content">
    <div class="planning-container">
        <div class="planning-header">
            <h1 th:text="${schedule.name()}">Расписание</h1>
        </div>
        <nav class="planning-tabs">
            <a th:href="@{/schools/{schoolId}/schedules/{scheduleId}/curriculum(schoolId=${school.uid()},scheduleId=${schedule.uid()})}"
               class="tab-link active">
                План классов
            </a>
            <a th:href="@{/schools/{schoolId}/schedules/{scheduleId}/capacity(schoolId=${school.uid()},scheduleId=${schedule.uid()})}"
               class="tab-link tab-validation">
                Нагрузка учителей
            </a>
            <a th:href="@{/schools/{schoolId}/schedules/{scheduleId}/assignments(schoolId=${school.uid()},scheduleId=${schedule.uid()})}"
               class="tab-link tab-validation">
                Назначения
            </a>
            <a th:href="@{/schools/{schoolId}/schedules/{scheduleId}/grid(schoolId=${school.uid()},scheduleId=${schedule.uid()})}"
               class="tab-link tab-validation">
                Сетка расписания
            </a>
            <a th:href="@{/schools/{schoolId}/schedules/{scheduleId}/validation(schoolId=${school.uid()},scheduleId=${schedule.uid()})}"
               class="tab-link tab-validation">
                Проверить план
            </a>
        </nav>

        <div class="section-header">
            <h2>План классов</h2>
            <button onclick="document.getElementById('add-modal').style.display='flex'"
                    class="btn-add">+ Добавить</button>
        </div>

        <div th:if="${param.error}" class="error-message" th:text="${param.error}">Ошибка</div>

        <table class="data-table">
            <thead>
            <tr>
                <th>Класс</th>
                <th>Предмет</th>
                <th>Часов/неделю</th>
                <th>Назначено</th>
                <th>Статус</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(curriculums)}">
                <td colspan="6" class="empty-state">Нет данных. Добавьте план класса.</td>
            </tr>
            <tr th:each="curric : ${curriculums.list()}">
                <td th:text="${curric.schoolClass().name()}">5А</td>
                <td th:text="${curric.subject().name()}">Математика</td>
                <td th:text="${curric.hoursPerWeek()}">5</td>
                <td th:text="${curric.assignedCurriculum().assignedHours() != null ? curric.assignedCurriculum().assignedHours() : 0}">0</td>
                <td>
                    <span th:classappend="${curric.assignedCurriculum().assignedHours() == curric.hoursPerWeek() ? 'status-complete' :
                                        curric.assignedCurriculum().assignedHours() != null && curric.assignedCurriculum().assignedHours() > 0 ? 'status-partial' : 'status-empty'}"
                          class="status-badge">
                        <span th:text="${curric.assignedCurriculum().assignedHours() != null ? curric.assignedCurriculum().assignedHours() : 0}">0</span>/<span th:text="${curric.hoursPerWeek()}">5</span>
                    </span>
                </td>
                <td>
                    <form th:action="@{/schools/{schoolId}/schedules/{scheduleId}/curriculum/{curriculumId}/delete(schoolId=${school.uid()},scheduleId=${schedule.uid()},curriculumId=${curric.uid()})}"
                          method="post"
                          style="display: inline;"
                          onsubmit="return confirm('Удалить план класса?')">
                        <button type="submit" class="btn-action btn-delete">Удалить</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div id="add-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="document.getElementById('add-modal').style.display='none'">&times;</span>
            <h2>Добавить план класса</h2>
            <form th:action="@{/schools/{schoolId}/schedules/{scheduleId}/curriculum/create(schoolId=${school.uid()},scheduleId=${schedule.uid()})}"
                  method="post">
                <label>
                    Класс
                    <select name="clazz" required>
                        <option value="">Выберите класс</option>
                        <option th:each="cls : ${classes.list()}"
                                th:value="${cls.uid()}"
                                th:text="${cls.name()}">5А</option>
                    </select>
                </label>
                <label>
                    Предмет
                    <select name="subject" required>
                        <option value="">Выберите предмет</option>
                        <option th:each="subj : ${subjects.list()}"
                                th:value="${subj.uid()}"
                                th:text="${subj.name()}">Математика</option>
                    </select>
                </label>
                <label>
                    Часов в неделю
                    <input type="number" name="hours" min="1" max="10" required/>
                </label>
                <button type="submit" class="btn-submit">Сохранить</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
