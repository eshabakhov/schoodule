name: Build And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build application
        run: mvn clean install -Pqulice

      - name: Prepare deployment bundle
        run: |
          mkdir -p deploy/target
          cp Dockerfile deploy/
          cp haproxy.cfg deploy/
          cp docker-compose.yml deploy/
          cp .dockerignore deploy/
          cp target/schoodule-0.0.1.jar deploy/target/

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add deploy host to known_hosts
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        run: ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" "mkdir -p '${{ secrets.DEPLOY_PATH }}'"

      - name: Upload deployment bundle
        run: rsync -az --delete deploy/ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Deploy with Docker Compose
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" <<EOF
          set -e
          cd "${{ secrets.DEPLOY_PATH }}"

          export APP_IMAGE="${{ vars.APP_IMAGE || 'schoodule-app:local' }}"
          export APP_PORT="${{ vars.APP_PORT || '9500' }}"
          export POSTGRES_IMAGE="${{ vars.POSTGRES_IMAGE || 'postgres:14-alpine' }}"
          export POSTGRES_PORT="${{ vars.POSTGRES_PORT || '5432' }}"
          export DB_HOST="${{ vars.DB_HOST || 'postgres' }}"
          export DB_PORT="${{ vars.DB_PORT || '5432' }}"
          export DB_NAME="${{ secrets.DB_NAME || 'postgres' }}"
          export DB_USERNAME="${{ secrets.DB_USERNAME || 'postgres' }}"
          export DB_PASSWORD="${{ secrets.DB_PASSWORD || 'postgres' }}"
          export YA_ID="${{ secrets.YA_ID }}"
          export YA_SECRET="${{ secrets.YA_SECRET }}"
          export BOOTSTRAP_ADMIN_ENABLED="${{ vars.BOOTSTRAP_ADMIN_ENABLED || 'false' }}"
          export BOOTSTRAP_ADMIN_USERNAME="${{ secrets.BOOTSTRAP_ADMIN_USERNAME }}"
          export BOOTSTRAP_ADMIN_EMAIL="${{ secrets.BOOTSTRAP_ADMIN_EMAIL }}"
          export BOOTSTRAP_ADMIN_PASSWORD="${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}"
          export JAR_FILE="target/schoodule-0.0.1.jar"

          docker compose up -d --build
          EOF
